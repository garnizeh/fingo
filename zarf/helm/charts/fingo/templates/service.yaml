apiVersion: v1
kind: Service
metadata:
  name: fingo-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fingo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "fingo.selectorLabels" . | nindent 4 }}
  ports:
    - name: fingo
      port: {{ .Values.service.ports.http }}
      targetPort: fingo
    - name: fingo-debug
      port: {{ .Values.service.ports.debug }}
      targetPort: fingo-debug
    - name: metrics
      port: {{ .Values.service.ports.metricsHttp }}
      targetPort: metrics
    - name: metrics-debug
      port: {{ .Values.service.ports.metricsDebug }}
      targetPort: metrics-debug
    - name: prometheus
      port: {{ .Values.service.ports.metricsPrometheus }}
      targetPort: metrics-prom
